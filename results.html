/*Section Risk level & provide Feedback if needed*/





    const feedback = document.getElementById("Feedback");
    const risk = document.getElementById("RiskLevel");

    if (score === 11) { 
        feedback.innerText = "Strong Security 😁";
        risk.innerText = "🟢 Risk Level: LOW 🟢";
}   else if (score >= 6) {
        feedback.innerText = "Moderate security 🙂";
        risk.innerText = "🟠 Risk Level: MEDIUM 🟠";
}   else {
        feedback.innerText = "Weak security 🥲";

}





/*Generates functions if the section has good or bad security  */







const container = document.getElementById("sections");

function NewSection(title, goodSecurity, steps, idPrefix) {
    const div = document.createElement("div");
    div.className = "card";

    let html = `<h2>${title}</h2>`;

    if (goodSecurity) {
        html += `<p class="good">✔️ Good practice in place</p>`;
    } else {
        html += `<p class="bad">✖️ Needs improvement</p>`;/*If section that displays if it needs improvement*/
        
        steps.forEach((step, index) => {
            const id = idPrefix + index; /*Creates unqiue ID for each checkbox*/
            html += `
                <div class="step">
                    <input type="checkbox" class="check-item" id="${id}" onchange="saveChecklist('${id}')">
                    <label for="${id}">
                        <strong>${step.title}</strong><br>
                        ${step.desc}<br>
                        <em>Example: ${step.example}</em>
                    </label>
                </div>
            `;
        });
    }

    div.innerHTML = html;
    container.appendChild(div);
}
